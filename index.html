<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | RHR Connect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.4s ease; }
        
        .glass-card { border-radius: 2.5rem; overflow: hidden; background: white; transition: all 0.4s ease; }
        .dark .glass-card { background: #1e293b; color: white; }

        /* --- Themes --- */
        .theme-classic { border: none; }
        .theme-border { border: 2px solid #e2e8f0; }
        .dark .theme-border { border-color: #334155; }
        .theme-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .theme-bold { border-top: 12px solid; }

        /* --- BIGGER ICON BOX (Ref: Design Studio) --- */
        .icon-box { 
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; 
            border-radius: 1.5rem; background: #f1f5f9; color: #1e293b; transition: 0.3s;
        }
        .icon-box svg { width: 35px; height: 35px; stroke-width: 2.5px; } 

        .social-text-link { 
            flex: 1; padding: 20px; text-align: center; border-radius: 1.5rem; 
            background: #f1f5f9; color: #1e293b; font-weight: 800; font-size: 15px;
        }

        .dark .icon-box, .dark .social-text-link { background: #334155 !important; color: #f1f5f9 !important; }
        
        .active-theme-btn { border: 4px solid #3b82f6 !important; background: #dbeafe !important; color: #1e40af !important; }
        .profile-img { width: 130px; height: 130px; object-fit: cover; border: 5px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    </style>
</head>

<body id="body-bg" class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
    
    <div class="fixed top-6 left-6 right-6 flex justify-between z-50">
        <button onclick="toggleDarkMode()" class="p-4 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl text-yellow-400">
            <i id="theme-icon" data-lucide="moon"></i>
        </button>
        <button onclick="openModal('pin-modal')" class="p-4 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl text-white">
            <i data-lucide="settings"></i>
        </button>
    </div>

    <div id="main-loader" class="text-white animate-pulse font-bold text-xs">CONNECTING TO RHR SERVER...</div>
    
    <div id="card-container" class="max-w-sm w-full glass-card shadow-2xl hidden">
        <div id="header-bg" class="h-36"></div> 
        <div class="px-6 pb-12 -mt-20 text-center">
            <img id="view-photo" src="" class="profile-img rounded-full mx-auto mb-6">
            <h1 id="view-name" class="text-3xl font-extrabold tracking-tight mb-1"></h1>
            <p id="view-title" class="text-blue-500 font-bold text-[12px] uppercase tracking-widest italic"></p>
            <p id="view-company" class="text-slate-400 text-[10px] font-bold mb-8 uppercase"></p>
            
            <p id="view-bio" class="text-slate-500 dark:text-slate-400 text-sm mb-10 italic leading-relaxed px-4"></p>

            <button id="save-btn-view" onclick="saveVCF()" class="w-full text-white py-6 rounded-3xl font-black text-sm mb-10 flex items-center justify-center gap-3 shadow-xl transform active:scale-95 transition-all">
                <i data-lucide="user-plus"></i> SAVE CONTACT
            </button>

            <div class="flex justify-center gap-6 mb-6">
                <a id="link-mobile" href="#" class="icon-box shadow-sm"><i data-lucide="phone"></i></a>
                <a id="link-email" href="#" class="icon-box shadow-sm"><i data-lucide="mail"></i></a>
                <a id="link-website" href="#" target="_blank" class="icon-box shadow-sm"><i data-lucide="globe"></i></a>
            </div>

            <div class="flex gap-4 mb-12">
                <a id="link-facebook" href="#" target="_blank" class="social-text-link shadow-sm">FACEBOOK</a>
                <a id="link-linkedin" href="#" target="_blank" class="social-text-link shadow-sm">LINKEDIN</a>
            </div>

            <div class="space-y-4 text-left">
                <div class="p-6 bg-slate-50/80 dark:bg-white/5 rounded-[2rem] border border-slate-100 dark:border-white/10">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-1">Address</p>
                    <p id="view-address" class="text-sm font-bold opacity-90"></p>
                </div>
                <div class="p-6 bg-slate-50/80 dark:bg-white/5 rounded-[2rem] border border-slate-100 dark:border-white/10">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-1">Expertise</p>
                    <p id="view-services" class="text-sm font-bold opacity-90"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-slate-950/95 hidden items-center justify-center p-6 z-[100] backdrop-blur-xl">
        <div class="bg-white dark:bg-slate-900 rounded-[3rem] p-10 max-w-xs w-full text-center shadow-2xl">
            <h3 class="text-2xl font-black mb-8 dark:text-white uppercase">Admin Access</h3>
            <input type="password" id="pin-input" class="w-full text-center text-4xl font-black border-none mb-10 focus:outline-none dark:bg-transparent dark:text-white" maxlength="4" placeholder="••••">
            <div class="flex gap-4">
                <button onclick="closeModal('pin-modal')" class="flex-1 py-4 text-slate-400 font-bold uppercase text-xs">Cancel</button>
                <button onclick="checkPin()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Unlock</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-white dark:bg-slate-950 hidden overflow-y-auto p-6 z-[200]">
        <div class="max-w-md mx-auto pb-32">
            <div class="flex justify-between items-center mb-12 mt-8">
                <h2 class="text-4xl font-black dark:text-white tracking-tighter italic">STUDIO</h2>
                <button onclick="closeModal('edit-modal')" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-full dark:text-white"><i data-lucide="x"></i></button>
            </div>

            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Choose Style</p>
            <div class="grid grid-cols-2 gap-3 mb-12">
                <button onclick="setTheme('theme-classic')" id="btn-theme-classic" class="p-5 border-2 rounded-3xl font-bold dark:text-white text-xs">Classic</button>
                <button onclick="setTheme('theme-border')" id="btn-theme-border" class="p-5 border-2 rounded-3xl font-bold dark:text-white text-xs">Modern</button>
                <button onclick="setTheme('theme-glass')" id="btn-theme-glass" class="p-5 border-2 rounded-3xl font-bold dark:text-white text-xs">Glass</button>
                <button onclick="setTheme('theme-bold')" id="btn-theme-bold" class="p-5 border-2 rounded-3xl font-bold dark:text-white text-xs">Bold</button>
            </div>

            <div id="edit-form-fields" class="space-y-6 mb-12"></div>
            
            <div class="p-8 bg-slate-50 dark:bg-slate-900 rounded-[3rem] mb-12">
                <div class="flex justify-between items-center mb-6">
                    <label class="text-sm font-bold dark:text-white">Accent Color</label>
                    <input type="color" id="inp-headercolor" oninput="changeColors()" class="w-14 h-14 border-none bg-transparent">
                </div>
                <div class="flex justify-between items-center">
                    <label class="text-sm font-bold dark:text-white">Outer Background</label>
                    <input type="color" id="inp-bgcolor" oninput="changeColors()" class="w-14 h-14 border-none bg-transparent">
                </div>
            </div>

            <button onclick="saveData()" id="save-btn" class="w-full py-7 bg-blue-600 text-white rounded-[2rem] font-black uppercase tracking-widest shadow-2xl transform active:scale-95 transition-all">SYNC TO CLOUD</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTTq1XZykPeviwJBS9BhLDpF7WqhRG3ZmN5KICeLZB93vdIVIouRw70SJuvufEnREmug/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "RHR-BIZ-01";
        let userData = {};
        let currentTheme = "theme-classic";

        async function init() {
            lucide.createIcons();
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) { 
                    userData = result.data; 
                    renderView(); 
                } else { document.getElementById('main-loader').innerText = "ID NOT FOUND"; }
            } catch (e) { document.getElementById('main-loader').innerText = "CONNECTION ERROR"; }
        }

        function renderView() {
            document.getElementById('view-photo').src = userData.Photo || '';
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-title').innerText = userData.Title;
            document.getElementById('view-company').innerText = userData.Company;
            document.getElementById('view-bio').innerText = userData.Bio || "";
            document.getElementById('view-address').innerText = userData.Address;
            document.getElementById('view-services').innerText = userData.Services;

            document.getElementById('link-mobile').href = `tel:${userData.Mobile}`;
            document.getElementById('link-email').href = `mailto:${userData.Email}`;
            document.getElementById('link-website').href = userData.Website;
            document.getElementById('link-facebook').href = userData.Facebook;
            document.getElementById('link-linkedin').href = userData.LinkedIn;

            setTheme(userData.Theme || 'theme-classic');
            applyColors(userData.Header_Color, userData.BG_Color);

            document.getElementById('main-loader').classList.add('hidden');
            document.getElementById('card-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function setTheme(theme) {
            currentTheme = theme;
            const card = document.getElementById('card-container');
            card.className = `max-w-sm w-full glass-card shadow-2xl ${theme}`;
            document.querySelectorAll('[id^="btn-theme-"]').forEach(b => b.classList.remove('active-theme-btn'));
            const selectedBtn = document.getElementById(`btn-${theme}`);
            if(selectedBtn) selectedBtn.classList.add('active-theme-btn');
            if(theme === 'theme-bold') card.style.borderColor = document.getElementById('inp-headercolor').value;
            else card.style.borderColor = 'transparent';
        }

        function applyColors(head, bg) {
            document.body.style.backgroundColor = bg || "#0f172a";
            document.getElementById('header-bg').style.backgroundColor = head || "#3b82f6";
            document.getElementById('save-btn-view').style.backgroundColor = head || "#3b82f6";
            document.getElementById('inp-headercolor').value = head || "#3b82f6";
            document.getElementById('inp-bgcolor').value = bg || "#0f172a";
        }

        function changeColors() {
            applyColors(document.getElementById('inp-headercolor').value, document.getElementById('inp-bgcolor').value);
        }

        function setupEditForm() {
            const fields = [
                {id: 'name', label: 'Full Name', val: userData.Name}, {id: 'title', label: 'Designation', val: userData.Title},
                {id: 'company', label: 'Company', val: userData.Company}, {id: 'bio', label: 'Short Bio', val: userData.Bio},
                {id: 'mobile', label: 'Mobile No', val: userData.Mobile}, {id: 'email', label: 'Email Address', val: userData.Email},
                {id: 'website', label: 'Website URL', val: userData.Website}, {id: 'facebook', label: 'Facebook URL', val: userData.Facebook},
                {id: 'linkedin', label: 'LinkedIn URL', val: userData.LinkedIn}, {id: 'address', label: 'Office Address', val: userData.Address},
                {id: 'services', label: 'Your Services', val: userData.Services}, {id: 'photo', label: 'Profile Photo URL', val: userData.Photo},
                {id: 'finalpin', label: 'Update Admin PIN', val: userData.Admin_PIN} // আইডি ফিক্সড
            ];
            document.getElementById('edit-form-fields').innerHTML = fields.map(f => `
                <div>
                    <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase ml-2">${f.label}</label>
                    <input id="inp-${f.id}" value="${f.val || ''}" class="w-full p-6 bg-slate-50 dark:bg-slate-900 dark:text-white rounded-[1.5rem] border-none font-bold text-sm focus:ring-2 focus:ring-blue-500">
                </div>`).join('');
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "SYNCING DATA..."; btn.disabled = true;
            
            const data = {
                id: PROFILE_ID,
                pin: document.getElementById('inp-finalpin').value, // পিন ভ্যালু রিড ফিক্সড
                name: document.getElementById('inp-name').value,
                title: document.getElementById('inp-title').value,
                company: document.getElementById('inp-company').value,
                bio: document.getElementById('inp-bio').value,
                mobile: document.getElementById('inp-mobile').value,
                email: document.getElementById('inp-email').value,
                website: document.getElementById('inp-website').value,
                facebook: document.getElementById('inp-facebook').value,
                linkedin: document.getElementById('inp-linkedin').value,
                address: document.getElementById('inp-address').value,
                services: document.getElementById('inp-services').value,
                photo: document.getElementById('inp-photo').value,
                headerColor: document.getElementById('inp-headercolor').value,
                bgColor: document.getElementById('inp-bgcolor').value,
                theme: currentTheme
            };

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await response.json();
                if(result.success) {
                    alert("Card Updated Successfully!");
                    location.reload();
                } else {
                    alert("Error: " + result.message);
                    btn.disabled = false; btn.innerText = originalText;
                }
            } catch (e) { 
                alert("Network Error! Please try again."); 
                btn.disabled = false; btn.innerText = originalText; 
            }
        }

        function checkPin() {
            const input = document.getElementById('pin-input').value;
            if(input === (userData.Admin_PIN || "1111")) {
                setupEditForm(); closeModal('pin-modal'); openModal('edit-modal');
            } else {
                alert("WRONG PIN! Try Again.");
                document.getElementById('pin-input').value = "";
            }
        }

        function saveVCF() {
            const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${userData.Name}\nORG:${userData.Company}\nTITLE:${userData.Title}\nTEL:${userData.Mobile}\nEMAIL:${userData.Email}\nURL:${userData.Website}\nEND:VCARD`;
            const blob = new Blob([vcf], {type:'text/vcard'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download=`${userData.Name}.vcf`; a.click();
        }

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); lucide.createIcons(); }
        function openModal(id) { document.getElementById(id).style.display = (id==='edit-modal'?'block':'flex'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        window.onload = init;
    </script>
</body>
</html>
