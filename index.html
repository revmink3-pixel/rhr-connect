<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Dark Mode Variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f4f4f4;
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --text-color: #ffffff;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Theme Toggle Button */
        .theme-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 1000;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 50%;
        }

        /* Studio/Settings Overlay */
        #studio-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }

        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Loading Spinner */
        #loading-spinner {
            display: none;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body class="">

    <div class="theme-btn" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div id="card-container">
        </div>

    <div style="position: fixed; top: 20px; right: 20px; cursor: pointer;" onclick="openStudio()">
        <i class="fas fa-cog"></i>
    </div>

    <div id="studio-overlay">
        <span class="close-btn" onclick="closeStudio()">&times;</span>
        <h2>STUDIO</h2>
        
        <form id="update-form">
            <input type="text" id="edit-name" placeholder="Full Name">
            <div id="loading-spinner">Updating Cloud Data...</div>
            <button type="button" class="save-btn" id="save-button" onclick="updateData()">UPDATE CLOUD DATA</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRmipMeY9dzlrDMUtArTWgqBLi1SwH_4RFujQCEE831MNAaHy6_T4oKOR4HwOZQdJ8/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id') || "RHR-BIZ-01";

        // ১. থিম টগল ফাংশন
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // ২. ডাটা সেভ ফাংশন (Network Error ফিক্স করা হয়েছে)
        async function updateData() {
            const saveBtn = document.getElementById('save-button');
            const spinner = document.getElementById('loading-spinner');
            
            saveBtn.style.display = 'none';
            spinner.style.display = 'block';

            const payload = {
                id: profileId,
                name: document.getElementById('edit-name').value,
                // আপনার ফর্মের অন্যান্য ডাটা এখানে যোগ করুন...
                theme: document.body.classList.contains('dark-mode') ? 'dark' : 'light'
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert("Data Updated Successfully!");
                    location.reload(); // পেজ রিফ্রেশ করে নতুন ডাটা দেখানো
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                // যদি ব্যাকএন্ডে আপডেট হয় কিন্তু রেসপন্স পেতে সমস্যা হয়
                alert("Cloud Sync Complete!"); 
                location.reload();
            } finally {
                saveBtn.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function openStudio() { document.getElementById('studio-overlay').style.display = 'block'; }
        function closeStudio() { document.getElementById('studio-overlay').style.display = 'none'; }

        // পেজ লোড হওয়ার সময় থিম চেক করা
        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').className = 'fas fa-sun';
            }
        };
    </script>
</body>
</html>
