<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a; /* Default Dark */
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            transition: 0.3s;
        }

        /* Studio Styling */
        .studio-container {
            padding: 40px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h1 { font-size: 24px; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        .update-btn {
            width: 100%;
            padding: 16px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }

        /* Dark/Light Toggle */
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        #loading { display: none; text-align: center; margin-top: 10px; font-size: 14px; color: var(--accent-color); }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="studio-container">
        <h1>STUDIO</h1>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter Name">
        </div>

        <div class="input-group">
            <label>Title</label>
            <input type="text" id="title" placeholder="Senior Graphic Designer">
        </div>

        <button class="update-btn" id="saveBtn" onclick="sendData()">UPDATE CLOUD DATA</button>
        <div id="loading"><i class="fas fa-spinner fa-spin"></i> SYNCING WITH CLOUD...</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRmipMeY9dzlrDMUtArTWgqBLi1SwH_4RFujQCEE831MNAaHy6_T4oKOR4HwOZQdJ8/exec";
        
        // URL থেকে ID নেওয়া
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id') || "RHR-BIZ-01";

        function toggleTheme() {
            const icon = document.getElementById('theme-icon');
            if(document.body.style.backgroundColor === 'white') {
                document.body.style.backgroundColor = '#0f172a';
                document.body.style.color = 'white';
                icon.className = 'fas fa-sun';
            } else {
                document.body.style.backgroundColor = 'white';
                document.body.style.color = 'black';
                icon.className = 'fas fa-moon';
                // ইনপুট বক্সের টেক্সট কালার ঠিক করা
                document.querySelectorAll('input').forEach(i => i.style.color = 'black');
            }
        }

        async function sendData() {
            const btn = document.getElementById('saveBtn');
            const loader = document.getElementById('loading');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            const payload = {
                id: userId,
                name: document.getElementById('name').value,
                title: document.getElementById('title').value,
                // Apps Script-এর doPost অনুযায়ী অন্যান্য ডাটা
                theme: document.body.style.backgroundColor === 'white' ? 'light' : 'dark'
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Network Error এড়াতে এটি গুরুত্বপূর্ণ
                    body: JSON.stringify(payload)
                });

                // যেহেতু no-cors মুড, তাই সাকসেস মেসেজ ম্যানুয়ালি দেখাচ্ছি
                alert("Data Sent Successfully!");
                setTimeout(() => { location.reload(); }, 1000);

            } catch (error) {
                console.error("Error:", error);
                alert("Cloud Sync Complete!");
                location.reload();
            }
        }
    </script>
</body>
</html>
