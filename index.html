<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="page-title">Digital Business Card | RHR Connect</title>
    <meta name="description" id="meta-desc" content="Scan to connect with me instantly via RHR Smart Way.">
    <meta property="og:type" content="website">
    <meta property="og:title" id="og-title" content="Digital Business Card">
    <meta property="og:description" id="og-desc" content="Professional Profile & Contact Details.">
    <meta property="og:image" id="og-image" content=""> <meta property="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        // Tailwind Dark Mode Config
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.4s ease; }
        
        /* ডার্ক মোড স্টাইল */
        .dark body { background-color: #0f172a !important; }
        .dark .glass-card { background: #1e293b !important; color: white !important; border: 1px solid #334155; }
        .dark #view-name { color: #f8fafc; }
        .dark #view-bio, .dark #view-address, .dark #view-services { color: #cbd5e1; }
        .dark .icon-box, .dark .social-text-link { background: #334155; border-color: #475569; color: #f1f5f9; }

        .glass-card { border-radius: 2.5rem; transition: transform 0.3s; }
        .profile-img { width: 110px; height: 110px; object-fit: cover; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .icon-box { min-width: 48px; min-height: 48px; display: flex; items-center; justify-content: center; border-radius: 1rem; background: #f8fafc; border: 1px solid #f1f5f9; transition: 0.3s; }
        .social-text-link { flex: 1; padding: 0.8rem; text-align: center; border-radius: 1rem; background: #f8fafc; border: 1px solid #f1f5f9; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>

<body id="body-bg" class="min-h-screen flex items-center justify-center p-4 bg-[#0100f0]">
    
    <button onclick="toggleDarkMode()" class="fixed top-6 left-6 p-3 bg-white dark:bg-slate-800 shadow-lg rounded-full z-50 text-slate-500 dark:text-yellow-400">
        <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
    </button>

    <button onclick="openModal('pin-modal')" class="fixed top-6 right-6 p-3 bg-white dark:bg-slate-800 shadow-lg rounded-full z-50 text-slate-400">
        <i data-lucide="settings" class="w-5 h-5"></i>
    </button>

    <div id="main-loader" class="text-white animate-pulse">Connecting...</div>
    
    <div id="card-container" class="max-w-sm w-full glass-card bg-white shadow-2xl overflow-hidden hidden">
        <div id="header-bg" class="h-28 bg-[#1e293b]"></div> 
        <div class="px-6 pb-8 -mt-14 text-center">
            <img id="view-photo" src="" class="profile-img rounded-full mx-auto mb-3 bg-slate-100">
            <h1 id="view-name" class="text-xl font-bold text-slate-800"></h1>
            <p id="view-title" class="text-blue-500 font-bold text-[10px] uppercase tracking-widest italic"></p>
            <p id="view-company" class="text-slate-400 text-[10px] font-bold mb-4 uppercase"></p>
            
            <p id="view-bio" class="text-slate-500 text-xs mb-6 px-2 italic"></p>

            <button id="save-btn-view" onclick="saveVCF()" class="w-full bg-[#1e293b] text-white py-4 rounded-2xl font-bold text-sm mb-6 flex items-center justify-center gap-2">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Save Contact
            </button>

            <div class="flex justify-center gap-3 mb-4">
                <a id="link-mobile" href="#" class="icon-box"><i data-lucide="phone" class="w-5 h-5"></i></a>
                <a id="link-email" href="#" class="icon-box"><i data-lucide="mail" class="w-5 h-5"></i></a>
                <a id="link-website" href="#" target="_blank" class="icon-box"><i data-lucide="globe" class="w-5 h-5"></i></a>
            </div>

            <div class="flex gap-2 mb-8">
                <a id="link-facebook" href="#" target="_blank" class="social-text-link">Facebook</a>
                <a id="link-linkedin" href="#" target="_blank" class="social-text-link">LinkedIn</a>
            </div>

            <div class="space-y-3 text-left">
                <div class="p-4 bg-slate-50/50 dark:bg-slate-700/30 rounded-2xl border border-slate-100 dark:border-slate-700">
                    <p class="text-[9px] font-extrabold text-slate-400 uppercase">Office Address</p>
                    <p id="view-address" class="text-sm font-semibold"></p>
                </div>
                <div class="p-4 bg-slate-50/50 dark:bg-slate-700/30 rounded-2xl border border-slate-100 dark:border-slate-700">
                    <p class="text-[9px] font-extrabold text-slate-400 uppercase">Services</p>
                    <p id="view-services" class="text-sm font-semibold"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTTq1XZykPeviwJBS9BhLDpF7WqhRG3ZmN5KICeLZB93vdIVIouRw70SJuvufEnREmug/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "RHR-BIZ-01";
        let userData = {};

        // 🌗 Toggle Dark Mode
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) { 
                    userData = result.data; 
                    renderView(); 
                } else { document.getElementById('main-loader').innerText = "ID Not Found!"; }
            } catch (e) { document.getElementById('main-loader').innerText = "Error!"; }
        }

        function renderView() {
            document.getElementById('view-photo').src = userData.Photo;
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-title').innerText = userData.Title;
            document.getElementById('view-company').innerText = userData.Company;
            document.getElementById('view-bio').innerText = userData.Bio;
            document.getElementById('view-address').innerText = userData.Address;
            document.getElementById('view-services').innerText = userData.Services;

            // 🌐 OG Tags Update (For Social Sharing)
            document.title = `${userData.Name} | Digital Card`;
            document.getElementById('og-title').content = userData.Name;
            document.getElementById('og-desc').content = `${userData.Title} at ${userData.Company}`;
            document.getElementById('og-image').content = userData.Photo;

            document.getElementById('main-loader').classList.add('hidden');
            document.getElementById('card-container').classList.remove('hidden');
            
            // Apply Colors
            document.body.style.backgroundColor = userData.BG_Color;
            document.getElementById('header-bg').style.backgroundColor = userData.Header_Color;
            document.getElementById('save-btn-view').style.backgroundColor = userData.Header_Color;
            
            lucide.createIcons();
        }

        // বাকি ফাংশনগুলো (saveData, checkPin, openModal) আগের মতোই থাকবে।
        window.onload = init;
    </script>
</body>
</html>
